---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: devops-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: devops-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: devops-lab
  labels:
    app: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      initContainers:
        - name: install-kubectl
          image: bitnami/kubectl:latest
          command: ['sh', '-c', 'cp /opt/bitnami/kubectl/bin/kubectl /mnt/kubectl/kubectl && chmod +x /mnt/kubectl/kubectl']
          volumeMounts:
            - name: kubectl-bin
              mountPath: /mnt/kubectl
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts-jdk17
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50000
              name: agent
          env:
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false -Xmx1g"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: kubectl-bin
              mountPath: /usr/local/bin/kubectl
              subPath: kubectl
      volumes:
        - name: jenkins-home
          emptyDir: {}
        - name: kubectl-bin
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: devops-lab
spec:
  type: NodePort
  selector:
    app: jenkins
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30090
    - name: agent
      port: 50000
      targetPort: 50000
      nodePort: 30091
