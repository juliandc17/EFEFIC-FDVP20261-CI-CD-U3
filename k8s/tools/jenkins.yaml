---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: devops-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: devops-lab
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-pvc
  namespace: devops-lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: devops-lab
  labels:
    app: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      # Permisos necesarios para el socket de Docker y carpetas de Jenkins
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: install-tools
          image: docker:26.0.0 # Usamos una versión moderna para evitar el error de API
          command: ["sh", "-c", "cp /usr/local/bin/docker /mnt/tools/docker && chmod +x /mnt/tools/docker && apk add --no-cache curl && curl -LO https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl && chmod +x kubectl && mv kubectl /mnt/tools/"]
          volumeMounts:
            - name: tools-bin
              mountPath: /mnt/tools
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts-jdk17
          securityContext:
            runAsUser: 0 # Root necesario para interactuar con /var/run/docker.sock en laboratorios
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50000
              name: agent
          env:
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=true -Xmx1g"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: tools-bin
              mountPath: /usr/local/bin/kubectl
              subPath: kubectl
            - name: tools-bin
              mountPath: /usr/local/bin/docker
              subPath: docker
            - name: docker-socket
              mountPath: /var/run/docker.sock
      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: jenkins-pvc
        - name: tools-bin
          emptyDir: {}
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: devops-lab
spec:
  type: NodePort
  selector:
    app: jenkins
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30090
    - name: agent
      port: 50000
      targetPort: 50000
      nodePort: 30091