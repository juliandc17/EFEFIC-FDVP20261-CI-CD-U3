apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  namespace: devops-lab
  labels:
    app: devops-app
    version: "2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops-app
        version: "2.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: devops-app
          # La imagen se actualiza automáticamente por el pipeline Jenkins:
          #   kubectl set image deployment/devops-app devops-app=TU_USUARIO/devops-app:latest
          # En el primer despliegue manual, reemplaza TU_DOCKER_HUB_USERNAME:
          image: juliandc17/devops-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: devops-app-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
